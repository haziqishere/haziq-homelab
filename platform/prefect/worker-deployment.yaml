apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-worker
  namespace: prefect
  labels:
    app: prefect-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-worker
  template:
    metadata:
      labels:
        app: prefect-worker
    spec:
      serviceAccountName: prefect-worker
      containers:
      - name: worker
        image: prefecthq/prefect:3-python3.12
        command:
          - /bin/bash
          - -c
          - |
            pip install prefect-kubernetes && \
            prefect worker start --pool kubernetes-pool --type kubernetes
        env:
        - name: PREFECT_API_URL
          value: "http://prefect-server.prefect.svc.cluster.local:4200/api"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
              - /bin/bash
              - -c
              - "ps aux | grep 'prefect worker' | grep -v grep"
          initialDelaySeconds: 120
          periodSeconds: 300
          failureThreshold: 3
          timeoutSeconds: 10
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prefect-worker
  namespace: prefect
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prefect-worker-cluster-role
rules:
  # Permissions to create and manage jobs in any namespace
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]

  # Permissions to get and list pods in any namespace (for kubectl cp and logs)
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]

  # Permissions to execute commands in pods (for kubectl cp)
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]

  # Permissions to read pod logs
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prefect-worker-cluster-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prefect-worker-cluster-role
subjects:
  - kind: ServiceAccount
    name: prefect-worker
    namespace: prefect