---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prefect-worker
  namespace: minecraft

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prefect-worker-role
  namespace: minecraft
rules:
  # Permissions to list and get pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

  # Permissions to execute commands in pods
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]

  # Permissions to read pod logs (optional, for debugging)
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prefect-worker-binding
  namespace: minecraft
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: prefect-worker-role
subjects:
  - kind: ServiceAccount
    name: prefect-worker
    namespace: minecraft