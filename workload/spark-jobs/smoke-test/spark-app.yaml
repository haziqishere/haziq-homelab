apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: smoke-test
  namespace: spark-jobs
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: apache/spark:3.5.0
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/work-dir/smoke_test.py
  sparkVersion: "3.5.0"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    memory: "512m"
    serviceAccount: spark
    volumeMounts:
      - name: script
        mountPath: /opt/spark/work-dir
  executor:
    cores: 1
    instances: 1
    memory: "512m"
  volumes:
    - name: script
      configMap:
        name: smoke-test-script
        items:
          - key: smoke_test.py
            path: smoke_test.py
