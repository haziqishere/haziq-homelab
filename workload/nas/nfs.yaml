apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: nas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      nodeSelector:
        kubernetes.io/hostname: haziq-homelab
      containers:
        - name: nfs-server
          image: itsthenetwork/nfs-server-alpine:latest
          env:
            - name: SHARED_DIRECTORY
              value: /media
          ports:
            - containerPort: 2049
              hostPort: 2049
          securityContext:
            privileged: true
          volumeMounts:
            - name: media
              mountPath: /media
      volumes:
        - name: media
          hostPath:
            path: /mnt/obj-storage/media
---
apiVersion: v1
kind: Service
metadata:
  name: nfs-server
  namespace: nas
spec:
  type: ClusterIP
  selector:
    app: nfs-server
  ports:
    - port: 2049
      targetPort: 2049