# Traefik is daemonset for k3s as built-in ingress controller
# out of the box, it already binds to port/443 on every node 
# we just need to add IngressClass to tell kubernetes that there already existing controller claiming this class

apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: traefik
spec:
  controller: traefik.io/ingress-controller
